name: Build sub3dtool (MSBuild)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 下載程式碼 (Checkout)
      uses: actions/checkout@v3

    - name: 設定 MSBuild (Setup MSBuild)
      uses: microsoft/setup-msbuild@v1.1

    - name: 編譯程式 (Build)
      # 這個專案確實叫 sub3dtool.sln，我確認過了
      run: msbuild sub3dtool.sln /p:Configuration=Release /p:Platform=x86

    - name: 尋找並上傳成品
      uses: actions/upload-artifact@v4
      with:
        name: sub3dtool-exe
        path: |
          **/*.exe
          !**/SimpleTest.exe
